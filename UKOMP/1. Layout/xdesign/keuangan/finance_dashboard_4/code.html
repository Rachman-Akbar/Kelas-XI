<!DOCTYPE html>
<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Transaksi Baru</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#197fe6",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input:focus, select:focus, textarea:focus {
            outline: none !important;
            border-color: #197fe6 !important;
            box-shadow: 0 0 0 2px rgba(25, 127, 230, 0.1) !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#111418] dark:text-white font-display">
<div class="relative flex h-full min-h-screen w-full max-w-[430px] mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden shadow-2xl">
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-4 justify-between sticky top-0 z-10 border-b border-gray-100 dark:border-gray-800">
<div class="flex w-12 items-center">
<button class="flex size-10 items-center justify-center rounded-full hover:bg-gray-50 dark:hover:bg-gray-800">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
</div>
<div class="flex-1 text-center">
<h2 class="text-[#111418] dark:text-white text-base font-bold leading-tight tracking-tight">Input Transaksi</h2>
</div>
<div class="flex w-12 items-center justify-end">
<button class="flex size-10 items-center justify-center rounded-full text-primary">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</div>
<div class="flex flex-col flex-1 pb-32">
<div class="p-4">
<div class="flex bg-gray-100 dark:bg-gray-800 p-1 rounded-xl">
<button class="flex-1 py-2.5 text-sm font-bold rounded-lg bg-white dark:bg-gray-700 shadow-sm text-primary transition-all">Pemasukan</button>
<button class="flex-1 py-2.5 text-sm font-bold rounded-lg text-gray-500 dark:text-gray-400 transition-all">Pengeluaran</button>
</div>
</div>
<div class="px-4 space-y-5">
<div class="space-y-2">
<label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider px-1">Nominal Transaksi</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-gray-400">Rp</span>
<input class="w-full bg-white dark:bg-gray-800 border-none rounded-xl py-5 pl-12 pr-4 text-3xl font-bold text-primary placeholder-gray-300 dark:placeholder-gray-600 shadow-sm" placeholder="0" type="number"/>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider px-1">Tanggal</label>
<div class="relative">
<input class="w-full bg-white dark:bg-gray-800 border-none rounded-xl py-3 pl-10 pr-4 text-sm font-medium shadow-sm appearance-none" type="date"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xl">calendar_today</span>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider px-1">Rekening</label>
<select class="w-full bg-white dark:bg-gray-800 border-none rounded-xl py-3 px-4 text-sm font-medium shadow-sm appearance-none">
<option>Kas Perusahaan</option>
<option>BCA - 0982</option>
<option>Mandiri - 4412</option>
</select>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider px-1">Kategori</label>
<div class="relative">
<select class="w-full bg-white dark:bg-gray-800 border-none rounded-xl py-3 pl-10 pr-4 text-sm font-medium shadow-sm appearance-none">
<option>Pilih Kategori</option>
<option>Penjualan Produk</option>
<option>Jasa Konsultasi</option>
<option>Pendapatan Lainnya</option>
<option>Investasi</option>
</select>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary text-xl">category</span>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider px-1">Catatan (Opsional)</label>
<textarea class="w-full bg-white dark:bg-gray-800 border-none rounded-xl p-4 text-sm font-medium shadow-sm placeholder-gray-400" placeholder="Tulis rincian transaksi di sini..." rows="3"></textarea>
</div>
<div class="space-y-2">
<label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider px-1">Lampiran</label>
<button class="w-full flex items-center justify-center gap-2 border-2 border-dashed border-gray-200 dark:border-gray-700 rounded-xl py-6 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
<span class="material-symbols-outlined text-gray-400">add_a_photo</span>
<span class="text-sm font-medium text-gray-500">Unggah Bukti Transaksi</span>
</button>
</div>
</div>
</div>
<div class="fixed bottom-20 left-0 right-0 max-w-[430px] mx-auto px-4 pb-4">
<button class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all">
                Simpan Transaksi
            </button>
</div>
<div class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto bg-white/95 dark:bg-background-dark/95 backdrop-blur-lg border-t border-gray-100 dark:border-gray-800 px-4 py-3 flex justify-between items-center z-50">
<button class="flex flex-1 flex-col items-center gap-1 text-gray-400">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Beranda</span>
</button>
<button class="flex flex-1 flex-col items-center gap-1 text-gray-400">
<span class="material-symbols-outlined">pie_chart</span>
<span class="text-[10px] font-medium">HPP-BEP</span>
</button>
<button class="flex flex-1 flex-col items-center gap-1 text-gray-400">
<span class="material-symbols-outlined">payments</span>
<span class="text-[10px] font-medium">Utang</span>
</button>
<button class="flex flex-1 flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined">receipt_long</span>
<span class="text-[10px] font-bold">Transaksi</span>
</button>
<button class="flex flex-1 flex-col items-center gap-1 text-gray-400">
<span class="material-symbols-outlined">description</span>
<span class="text-[10px] font-medium">Laporan</span>
</button>
</div>
<div class="fixed bottom-1 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-gray-300 dark:bg-gray-700 rounded-full z-50"></div>
</div>

</body></html>
