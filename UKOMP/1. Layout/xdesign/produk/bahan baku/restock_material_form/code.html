<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Restock Material Form</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#197fe6",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
select {
    appearance: none;
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuDD01va1izx-2nqyHlx-lEqvblMBzolKXfoclry7P86PyxOMGJ8lOUbnqj1bNYizmF7CkK4ev4RMYZdJqqc9nTbGyl5zRs_d5n85qcMPXYWhvEhy8aM0IhWhZtjUmo8lRr20DW454_tivkMQVXMTeooG_0LxKt3MEDl-It2QQhZ6_WhbK1qbL1nDQQfjcfBMtPZHTu_YBKO78LsZOzAVnODhgZP1T-0-Wi8I7rKGI_BxsKvJ1fFCs_2MIzQZoTynemP_Ycxs9phjTM);
    background-position: right 0.5rem center;
    background-repeat: no-repeat;
    background-size: 1.5em 1.5em;
    padding-right: 2.5rem
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen">
<div class="max-w-md mx-auto bg-white dark:bg-background-dark min-h-screen flex flex-col relative shadow-xl">
<!-- TopAppBar -->
<header class="sticky top-0 z-10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-gray-100 dark:border-gray-800">
<div class="flex items-center p-4 justify-between">
<button class="text-primary flex items-center gap-1">
<span class="material-symbols-outlined">chevron_left</span>
<span class="text-lg">Back</span>
</button>
<h2 class="text-[#111418] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Restock Material</h2>
</div>
</header>
<main class="flex-1 overflow-y-auto pb-32">
<div class="p-4 space-y-6">
<!-- Material Selection Section -->
<section class="space-y-4">
<h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider px-1">Material Details</h3>
<div class="space-y-4">
<!-- Material Dropdown -->
<div class="flex flex-col">
<label class="text-[#111418] dark:text-gray-200 text-sm font-medium pb-1.5 ml-1">Material</label>
<select class="form-select w-full rounded-xl text-[#111418] dark:text-white border border-[#dce0e5] dark:border-gray-700 bg-white dark:bg-gray-800 h-14 px-4 text-base focus:ring-2 focus:ring-primary focus:border-primary">
<option value="">Select material...</option>
<option value="aluminum">Aluminum Grade A</option>
<option value="steel">Stainless Steel Sheets</option>
<option value="polymer">Industrial Polymer</option>
<option value="copper">Copper Wiring (12ga)</option>
</select>
</div>
<!-- Date Picker -->
<div class="flex flex-col">
<label class="text-[#111418] dark:text-gray-200 text-sm font-medium pb-1.5 ml-1">Arrival Date</label>
<div class="relative">
<input class="form-input w-full rounded-xl text-[#111418] dark:text-white border border-[#dce0e5] dark:border-gray-700 bg-white dark:bg-gray-800 h-14 px-4 text-base focus:ring-2 focus:ring-primary focus:border-primary" type="date" value="2023-10-27"/>
<span class="material-symbols-outlined absolute right-4 top-4 text-gray-400 pointer-events-none">calendar_today</span>
</div>
</div>
</div>
</section>
<hr class="border-gray-100 dark:border-gray-800"/>
<!-- Financials Section -->
<section class="space-y-4">
<h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider px-1">Pricing &amp; Quantity</h3>
<div class="grid grid-cols-2 gap-4">
<!-- Quantity Input -->
<div class="flex flex-col">
<label class="text-[#111418] dark:text-gray-200 text-sm font-medium pb-1.5 ml-1">Quantity</label>
<input class="form-input w-full rounded-xl text-[#111418] dark:text-white border border-[#dce0e5] dark:border-gray-700 bg-white dark:bg-gray-800 h-14 px-4 text-base focus:ring-2 focus:ring-primary focus:border-primary" placeholder="0" type="number"/>
</div>
<!-- Price per Unit -->
<div class="flex flex-col">
<label class="text-[#111418] dark:text-gray-200 text-sm font-medium pb-1.5 ml-1">Price / Unit</label>
<div class="relative">
<span class="absolute left-4 top-4 text-gray-400">$</span>
<input class="form-input w-full rounded-xl text-[#111418] dark:text-white border border-[#dce0e5] dark:border-gray-700 bg-white dark:bg-gray-800 h-14 pl-8 pr-4 text-base focus:ring-2 focus:ring-primary focus:border-primary" placeholder="0.00" type="text"/>
</div>
</div>
</div>
<!-- Total Price (Calculated) -->
<div class="flex flex-col">
<label class="text-[#111418] dark:text-gray-200 text-sm font-medium pb-1.5 ml-1">Total Price (Calculated)</label>
<div class="relative">
<span class="absolute left-4 top-4 text-gray-500 font-semibold">$</span>
<input class="form-input w-full rounded-xl text-gray-500 border border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-900/50 h-14 pl-8 pr-4 text-base font-semibold" readonly="" type="text" value="0.00"/>
</div>
</div>
</section>
<hr class="border-gray-100 dark:border-gray-800"/>
<!-- Logistics Section -->
<section class="space-y-4">
<h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider px-1">Logistics</h3>
<!-- Supplier -->
<div class="flex flex-col">
<label class="text-[#111418] dark:text-gray-200 text-sm font-medium pb-1.5 ml-1">Supplier</label>
<select class="form-select w-full rounded-xl text-[#111418] dark:text-white border border-[#dce0e5] dark:border-gray-700 bg-white dark:bg-gray-800 h-14 px-4 text-base focus:ring-2 focus:ring-primary focus:border-primary">
<option value="">Select supplier...</option>
<option value="global-metals">Global Metals Corp</option>
<option value="titan-supply">Titan Industrial Supply</option>
<option value="precision-parts">Precision Parts Co.</option>
</select>
</div>
<!-- Invoice Number with Validation UI -->
<div class="flex flex-col">
<label class="text-[#111418] dark:text-gray-200 text-sm font-medium pb-1.5 ml-1">Invoice Number</label>
<input class="form-input w-full rounded-xl text-[#111418] dark:text-white border-red-500 bg-red-50/30 dark:bg-red-900/10 h-14 px-4 text-base focus:ring-2 focus:ring-red-500 focus:border-red-500" placeholder="INV-000000" type="text"/>
<p class="text-red-500 text-xs mt-1.5 ml-1 flex items-center gap-1">
<span class="material-symbols-outlined text-sm">error</span>
                            Invoice number is required for restock
                        </p>
</div>
</section>
</div>
</main>
<!-- Bottom Action Button -->
<footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-white/90 dark:bg-background-dark/90 backdrop-blur-md border-t border-gray-100 dark:border-gray-800">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                Save Restock Entry
            </button>
<!-- iPhone Indicator Spacer -->
<div class="h-6 w-full"></div>
</footer>
</div>
</body></html>
