<!DOCTYPE html>

<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Production Form</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#197fe6",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
.form-select-custom {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuANvH0BJ_qfXj7bbicXXcxvji9-0OEGjArDqEOUnvCg8ZuMzp0s13ooL1RzuBUqSNQGK3Xx0Diy4kz2xntAYEZRINkTujlgM4BraZJhwqPc2domivbGDTLKKYCfYj3PdtZcerKHgXO92bna_SEZtRQT2LFuxsgUdlOks34wIfbQLrHk5BK9BIiKN8IfXdRi2FtMUVBUq7wE_RQEJcT6xgwbxnhWsKOUV3xLn-L9TcyN3yEJUjBY--zNjQ-CVIagTCWq1wqU2G6UmeA);
    background-repeat: no-repeat;
    background-position: right 0.75rem center;
    background-size: 1.5rem;
    appearance: none
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#111418] dark:text-gray-100">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-[480px] mx-auto bg-white dark:bg-background-dark shadow-xl">
<!-- Header -->
<header class="flex items-center bg-white dark:bg-background-dark p-4 border-b border-gray-100 dark:border-gray-800 sticky top-0 z-10">
<button class="text-[#111418] dark:text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h2 class="text-[#111418] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Edit Produksi</h2>
</header>
<!-- Form Scroll Area -->
<main class="flex-1 overflow-y-auto pb-32">
<!-- Section: Product Details -->
<div class="px-4 pt-4">
<h3 class="text-[#111418] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] pb-2 pt-4">Detail Produk</h3>
</div>
<div class="flex flex-col gap-4 px-4 py-3">
<label class="flex flex-col w-full">
<p class="text-[#111418] dark:text-gray-300 text-sm font-medium leading-normal pb-2">Produk</p>
<select class="form-select-custom flex w-full min-w-0 flex-1 rounded-lg text-[#111418] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dce0e5] dark:border-gray-700 bg-white dark:bg-gray-800 h-14 p-[15px] text-base font-normal leading-normal">
<option value="A01">Ultra HD Camera Lens - Model A1</option>
<option value="A02">Precision Glass Filter - G9</option>
<option value="A03">Housing Case Aluminum - X2</option>
</select>
</label>
<label class="flex flex-col w-full">
<p class="text-[#111418] dark:text-gray-300 text-sm font-medium leading-normal pb-2">Target Kuantitas</p>
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-[#111418] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dce0e5] dark:border-gray-700 bg-white dark:bg-gray-800 h-14 placeholder:text-[#637588] p-[15px] text-base font-normal leading-normal" type="number" value="1500"/>
</label>
</div>
<!-- Section: Scheduling -->
<div class="px-4">
<h3 class="text-[#111418] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] pb-2 pt-4">Penjadwalan</h3>
</div>
<div class="flex flex-col gap-4 px-4 py-3">
<label class="flex flex-col w-full">
<p class="text-[#111418] dark:text-gray-300 text-sm font-medium leading-normal pb-2">Tanggal &amp; Waktu Produksi</p>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-[#111418] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dce0e5] dark:border-gray-700 bg-white dark:bg-gray-800 h-14 placeholder:text-[#637588] p-[15px] rounded-r-none border-r-0 pr-2 text-base font-normal leading-normal" type="datetime-local" value="2023-10-27T08:00"/>
<div class="text-[#637588] flex border border-[#dce0e5] dark:border-gray-700 bg-white dark:bg-gray-800 items-center justify-center pr-[15px] rounded-r-lg border-l-0">
<span class="material-symbols-outlined">calendar_today</span>
</div>
</div>
</label>
<div class="flex flex-col w-full">
<p class="text-[#111418] dark:text-gray-300 text-sm font-medium leading-normal pb-2">Shift</p>
<div class="flex bg-gray-100 dark:bg-gray-800 p-1 rounded-xl">
<button class="flex-1 py-2 text-sm font-semibold rounded-lg bg-white dark:bg-primary text-primary dark:text-white shadow-sm">Pagi</button>
<button class="flex-1 py-2 text-sm font-medium text-gray-500 dark:text-gray-400">Siang</button>
<button class="flex-1 py-2 text-sm font-medium text-gray-500 dark:text-gray-400">Malam</button>
</div>
</div>
</div>
<!-- Section: Administration -->
<div class="px-4">
<h3 class="text-[#111418] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] pb-2 pt-4">Administrasi</h3>
</div>
<div class="flex flex-col gap-4 px-4 py-3">
<label class="flex flex-col w-full">
<p class="text-[#111418] dark:text-gray-300 text-sm font-medium leading-normal pb-2">Person In Charge (PIC)</p>
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-[#111418] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dce0e5] dark:border-gray-700 bg-white dark:bg-gray-800 h-14 placeholder:text-[#637588] p-[15px] text-base font-normal leading-normal" type="text" value="Andi Setiawan"/>
</label>
<div class="flex flex-col w-full">
<p class="text-[#111418] dark:text-gray-300 text-sm font-medium leading-normal pb-2">Tingkat Prioritas</p>
<div class="grid grid-cols-3 gap-2">
<button class="py-3 text-sm font-medium rounded-lg border border-red-200 bg-red-50 text-red-600 dark:bg-red-900/20 dark:border-red-900/50">Tinggi</button>
<button class="py-3 text-sm font-semibold rounded-lg border border-primary bg-primary/10 text-primary dark:bg-primary/20">Sedang</button>
<button class="py-3 text-sm font-medium rounded-lg border border-gray-200 bg-gray-50 text-gray-500 dark:border-gray-700 dark:bg-gray-800/50">Rendah</button>
</div>
</div>
</div>
</main>
<!-- Footer Button -->
<div class="absolute bottom-[64px] left-0 right-0 p-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-gray-100 dark:border-gray-800">
<button class="w-full bg-primary text-white font-bold py-4 rounded-xl hover:opacity-90 transition-opacity">
                Simpan Perubahan
            </button>
</div>
<!-- Bottom Navigation -->
<nav class="absolute bottom-0 left-0 right-0 h-[64px] bg-white dark:bg-background-dark border-t border-gray-100 dark:border-gray-800 flex items-center justify-around px-2">
<button class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium mt-0.5">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500">
<span class="material-symbols-outlined">inventory_2</span>
<span class="text-[10px] font-medium mt-0.5">Bahan Baku</span>
</button>
<button class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500">
<span class="material-symbols-outlined">conveyor_belt</span>
<span class="text-[10px] font-medium mt-0.5">Produk</span>
</button>
<button class="flex flex-col items-center justify-center text-primary">
<span class="material-symbols-outlined">factory</span>
<span class="text-[10px] font-bold mt-0.5">Produksi</span>
</button>
</nav>
</div>
</body></html>
