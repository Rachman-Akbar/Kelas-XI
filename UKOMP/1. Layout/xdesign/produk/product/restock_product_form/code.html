<!DOCTYPE html>

<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Restock Product Form</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#197fe6",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#111418] dark:text-gray-100 transition-colors duration-200">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-background-light dark:bg-background-dark pb-32">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 flex items-center bg-white dark:bg-[#1c2631] border-b border-gray-200 dark:border-gray-800 p-4 pb-4 justify-between transition-colors">
<button class="text-[#111418] dark:text-white flex size-10 items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-[#111418] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Restock Produk</h2>
</header>
<main class="flex-1 overflow-y-auto px-4 py-6">
<div class="space-y-6">
<!-- Product Section (Read-Only) -->
<div class="space-y-2">
<p class="text-[#111418] dark:text-gray-300 text-sm font-semibold uppercase tracking-wider pl-1">Informasi Produk</p>
<div class="flex flex-col gap-4 bg-white dark:bg-[#1c2631] p-4 rounded-xl border border-gray-200 dark:border-gray-800">
<label class="flex flex-col w-full">
<p class="text-[#111418] dark:text-white text-sm font-medium pb-2">Produk</p>
<input class="form-input flex w-full rounded-lg text-gray-500 dark:text-gray-400 border border-[#dce0e5] dark:border-gray-700 bg-gray-50 dark:bg-gray-800 h-12 p-[15px] text-base font-normal" readonly="" value="Susu Pasteurisasi 500ml"/>
</label>
</div>
</div>
<!-- Stock Details -->
<div class="space-y-2">
<p class="text-[#111418] dark:text-gray-300 text-sm font-semibold uppercase tracking-wider pl-1">Detail Inventaris</p>
<div class="flex flex-col gap-4 bg-white dark:bg-[#1c2631] p-4 rounded-xl border border-gray-200 dark:border-gray-800">
<!-- Jumlah Restock -->
<label class="flex flex-col w-full">
<p class="text-[#111418] dark:text-white text-sm font-medium pb-2">Jumlah Restock</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-[#111418] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dce0e5] dark:border-gray-700 bg-white dark:bg-gray-800 h-12 p-[15px] text-base font-normal placeholder:text-gray-400" placeholder="0" type="number"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm">pcs</span>
</div>
</label>
<!-- Nomor Batch -->
<label class="flex flex-col w-full">
<p class="text-[#111418] dark:text-white text-sm font-medium pb-2">Nomor Batch</p>
<input class="form-input flex w-full rounded-lg text-[#111418] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dce0e5] dark:border-gray-700 bg-white dark:bg-gray-800 h-12 p-[15px] text-base font-normal placeholder:text-gray-400" placeholder="Contoh: BATCH-001"/>
</label>
</div>
</div>
<!-- Timelines -->
<div class="space-y-2">
<p class="text-[#111418] dark:text-gray-300 text-sm font-semibold uppercase tracking-wider pl-1">Tanggal Produksi &amp; Kadaluwarsa</p>
<div class="flex flex-col gap-4 bg-white dark:bg-[#1c2631] p-4 rounded-xl border border-gray-200 dark:border-gray-800">
<!-- Tanggal Produksi -->
<label class="flex flex-col w-full">
<p class="text-[#111418] dark:text-white text-sm font-medium pb-2">Tanggal Produksi</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-[#111418] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dce0e5] dark:border-gray-700 bg-white dark:bg-gray-800 h-12 p-[15px] text-base font-normal" type="date"/>
</div>
</label>
<!-- Expired Date -->
<label class="flex flex-col w-full">
<p class="text-[#111418] dark:text-white text-sm font-medium pb-2">Tanggal Kadaluwarsa</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-[#111418] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dce0e5] dark:border-gray-700 bg-white dark:bg-gray-800 h-12 p-[15px] text-base font-normal" type="date"/>
</div>
</label>
</div>
</div>
<!-- Quality Check -->
<div class="space-y-2">
<p class="text-[#111418] dark:text-gray-300 text-sm font-semibold uppercase tracking-wider pl-1">Kontrol Kualitas</p>
<div class="flex flex-col gap-4 bg-white dark:bg-[#1c2631] p-4 rounded-xl border border-gray-200 dark:border-gray-800">
<label class="flex flex-col w-full">
<p class="text-[#111418] dark:text-white text-sm font-medium pb-2">Catatan Quality Check</p>
<textarea class="form-textarea flex w-full rounded-lg text-[#111418] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dce0e5] dark:border-gray-700 bg-white dark:bg-gray-800 p-[15px] text-base font-normal placeholder:text-gray-400 resize-none" placeholder="Tulis catatan jika ada..." rows="3"></textarea>
</label>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="flex w-full cursor-pointer items-center justify-center rounded-xl h-14 bg-primary text-white text-base font-bold tracking-[0.015em] shadow-lg shadow-primary/20 active:scale-[0.98] transition-all">
                        Simpan Restock
                    </button>
</div>
</div>
</main>
<!-- Bottom Navigation Bar (iOS Style) -->
<nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 dark:bg-[#1c2631]/95 backdrop-blur-md border-t border-gray-200 dark:border-gray-800 px-6 py-2 pb-6 flex justify-between items-center">
<button class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 transition-colors">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 transition-colors">
<span class="material-symbols-outlined">inventory_2</span>
<span class="text-[10px] font-medium">Bahan Baku</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary transition-colors">
<span class="material-symbols-outlined">box</span>
<span class="text-[10px] font-medium">Produk</span>
</button>
<button class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 transition-colors">
<span class="material-symbols-outlined">factory</span>
<span class="text-[10px] font-medium">Produksi</span>
</button>
</nav>
<!-- iOS Home Indicator Overlay (Visual only) -->
<div class="fixed bottom-1 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-gray-300 dark:bg-gray-700 rounded-full opacity-50 z-50 pointer-events-none"></div>
</div>
</body></html>
